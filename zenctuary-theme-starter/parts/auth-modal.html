<!-- Global Authentication Modal -->
<div id="zenctuary-auth-modal" class="zen-modal-overlay" aria-hidden="true">
    <div class="zen-modal-container">
        <button id="zen-modal-close" class="zen-modal-close" aria-label="Close Modal">&times;</button>
        
        <div class="zen-modal-content">
            <!-- Login View -->
            <div id="zen-view-login" class="zen-auth-view" data-view="login">
                <div class="login-wrapper">
                    <header class="zen-auth-header">
                        <h2 tabindex="-1">SIGN-IN</h2>
                        <p class="zen-auth-subheading">Please sign in to continue.</p>
                    </header>
                    
                    <form id="zen-login-form" class="zen-auth-form">
                        <!-- Email Field -->
                        <div class="zen-form-group">
                            <label for="zen-login-email">E-Mail</label>
                            <div class="zen-input-container">
                                <input type="email" id="zen-login-email" name="email" placeholder="example@gmail.com" class="zen-input" required>
                                <button type="button" class="zen-input-icon zen-clear-input" aria-label="Clear email">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                </button>
                            </div>
                        </div>

                        <!-- Password Field -->
                        <div class="zen-form-group">
                            <label for="zen-login-password">Passwort</label>
                            <div class="zen-input-container">
                                <input type="password" id="zen-login-password" name="password" placeholder="***********" class="zen-input" required>
                                <button type="button" class="zen-input-icon zen-toggle-password" aria-label="Toggle password visibility">
                                    <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                </button>
                            </div>
                            <div class="zen-form-helper">
                                <a href="#" class="zen-link-forgot">Forgot password?</a>
                            </div>
                        </div>

                        <!-- News Checkbox -->
                        <div class="zen-form-row">
                            <label class="zen-checkbox-label">
                                <input type="checkbox" name="zen_news_subscription" value="1">
                                <span>I would like to be informed about news from Zenctuary (updates, discounts, and promotions)</span>
                            </label>
                        </div>
                        
                        <div class="zen-error-container" aria-live="polite"></div>
                        
                        <button type="submit" class="zen-btn-auth">
                            <span class="btn-text">Sign-In</span>
                            <span class="btn-loader"></span>
                        </button>
                    </form>

                    <footer class="zen-modal-footer">
                        <span>Neu bei Zenctuary?</span>
                        <button type="button" class="zen-link-gold" data-zen-switch-view="signup">Sign-Up</button>
                    </footer>
                </div>
            </div>

            <!-- Signup View -->
            <div id="zen-view-signup" class="zen-auth-view" data-view="signup">
                <h2 tabindex="-1">Sign Up</h2>
                
                <form id="zen-register-form" class="zen-auth-form">
                    <div class="zen-form-group">
                        <input type="email" name="email" placeholder="Email Address" class="zen-input" required>
                    </div>
                    <div class="zen-form-group">
                        <input type="password" name="password" placeholder="Password" class="zen-input" required>
                    </div>
                    <div class="zen-form-group">
                        <input type="text" name="username" placeholder="Username (Optional)" class="zen-input">
                    </div>

                    <div class="zen-error-container" aria-live="polite"></div>

                    <button type="submit" class="zen-btn-auth">
                        <span class="btn-text">Create Account</span>
                        <span class="btn-loader"></span>
                    </button>
                </form>

                <div class="zen-modal-nav">
                    <span>Already have an account?</span>
                    <button type="button" class="zen-link-gold" data-zen-switch-view="login">Sign in</button>
                </div>
            </div>

            <div id="zen-view-account" class="zen-auth-view" data-view="account">
                <h2 tabindex="-1">My Account</h2>
                <div class="zen-account-details">
                    <p>Welcome back, <strong id="zen-user-display-name"></strong>!</p>
                    <p class="zen-user-email" id="zen-user-email"></p>
                    <div class="zen-account-actions">
                        <button type="button" class="zen-btn-outline zen-logout-trigger">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

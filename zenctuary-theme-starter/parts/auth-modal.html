<!-- Global Authentication Modal -->
<div id="zenctuary-auth-modal" class="zen-modal-overlay" aria-hidden="true">
    <div class="zen-modal-container">
        <button id="zen-modal-close" class="zen-modal-close" aria-label="Close Modal">&times;</button>
        
        <div class="zen-modal-content">
            <!-- Login View -->
            <div id="zen-view-login" class="zen-auth-view" data-view="login">
                <h2>Login</h2>
                <p>Placeholder for login form.</p>
            </div>

            <!-- Signup View -->
            <div id="zen-view-signup" class="zen-auth-view" data-view="signup">
                <h2>Sign Up</h2>
                <p>Placeholder for signup form.</p>
            </div>

            <!-- Account View -->
            <div id="zen-view-account" class="zen-auth-view" data-view="account">
                <h2>My Account</h2>
                <p>Placeholder for account details.</p>
            </div>
        </div>
    </div>
</div>
